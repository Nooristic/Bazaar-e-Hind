<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages / Voice Call</title>
<style>
/* ===== FONT & BASE ===== */
body {
    font-family: 'Georgia', serif;
    margin: 0;
    padding: 0;
    background: transparent;
    color: #3e2723;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ===== BACKGROUND VIDEO ===== */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    pointer-events: none;
}

/* ===== HEADER ===== */
.blue-header {
    background-color: rgba(73, 40, 22, 0.389);
    color: white;
    padding: 1rem;
    text-align: center;
    position: relative;
}

.blue-header .back-link {
    color: white;
    text-decoration: none;
    font-size: 1.2rem;
    position: absolute;
    left: 1rem;
    top: 1rem;
}

/* ===== CONTAINER ===== */
.container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 25%;
    background-color: rgba(255, 255, 255, 0.92);
    border-right: 1px solid #ddd;
    padding: 1rem;
    overflow-y: auto;
}

.sidebar h2 {
    font-size: 1.2rem;
    margin-bottom: 1rem;
}

/* ===== MANUFACTURERS ===== */
.manufacturer {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
}

.manufacturer:hover {
    background-color: #f1f1f1;
}

.manufacturer .unread {
    background-color: #dc3545;
    color: white;
    padding: 0.3rem 0.6rem;
    border-radius: 50%;
    font-size: 0.8rem;
}

/* ===== CHAT WINDOW ===== */
.chat-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    background-color: rgba(255, 255, 255, 0.92);
    padding: 1rem;
}

.chat-history {
    flex: 1;
    overflow-y: auto;
    border-bottom: 1px solid #ddd;
    padding-bottom: 1rem;
}

.chat-message {
    margin-bottom: 1rem;
}

.chat-message.sent {
    text-align: right;
}

.chat-message p {
    display: inline-block;
    padding: 0.5rem 1rem;
    background-color: #007bff;
    color: white;
    border-radius: 8px;
}

.chat-message.received p {
    background-color: #f1f1f1;
    color: #3e2723;
}

/* ===== MESSAGE INPUT ===== */
.message-input {
    display: flex;
    align-items: center;
    margin-top: 1rem;
}

.message-input input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: inherit;
    color: #3e2723;
}

.message-input button {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 4px;
    background-color: #e0c68c;
    color: white;
    margin-left: 0.5rem;
    cursor: pointer;
    font-family: inherit;
}

/* ===== VOICE CALL ===== */
.voice-call {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1rem;
}

.voice-call button {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 4px;
    background-color: #28a745;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    font-family: inherit;
}

.voice-call button i {
    margin-right: 0.5rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ddd;
    }

    .chat-window {
        flex: 1;
    }
}
</style>
</head>
<body>

<!-- ✅ BACKGROUND VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="../../assests/silk video.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<header class="blue-header">
    <a href="../login.html" class="back-link">← Home</a>
    <h1>Messages / Voice Call</h1>
</header>

<div class="container">
    <div class="sidebar">
        <h2>Manufacturers</h2>
        <div class="manufacturer">
            <span>ABC Textiles</span>
            <span class="unread">3</span>
        </div>
        <div class="manufacturer">
            <span>XYZ Textiles</span>
            <span class="unread">5</span>
        </div>
    </div>

    <div class="chat-window">
        <div class="chat-history">
            <div class="chat-message received">
                <p>Hello, we need more details about the fabric.</p>
            </div>
            <div class="chat-message sent">
                <p>Sure, I will send the specifications shortly.</p>
            </div>
        </div>

        <div class="message-input">
            <input type="text" placeholder="Type your message...">
            <button>Send</button>
        </div>

        <div class="voice-call">
            <button>
                <i class="icon">📞</i>
                Start Voice Call
            </button>
        </div>
    </div>
</div>

<footer style="background:rgba(255,255,255,0.92);text-align:center;padding:1rem;">
    &copy; 2025 Fabric Bazaar. All rights reserved.
</footer>

</body>
</html>
