<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            background: none; /* Remove background image to avoid overlap */
            color: #5a3e2b;
            position: relative; /* Ensure content layers properly */
            z-index: 1; /* Place content above the video */
        }

        .blue-header {
            background-color: #bf170840;
            color: rgb(66, 22, 5);
            padding: 1rem;
            text-align: center;
            font-family: 'Georgia', serif;
        }
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1; /* Ensure video stays in the background */
        }

        .blue-header .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            position: absolute;
            left: 1rem;
            top: 1rem;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .tabs button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background-color:#e59f9f4d;
            color: white;
            cursor: pointer;
            font-family: 'Georgia', serif;
            margin: 0 0.5rem;
        }

        .tabs button.active {
            background-color: #e59f9f4d;
        }

        .tab-content {
            display: none;
            background-color: beige; /* Set the Manage Account section background color to beige */
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .tab-content.active {
            display: block;
        }

        .form-container {
            background-color: rgba(255, 245, 235, 0.92); /* Set the form container background color to beige */
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-container label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-container input, .form-container textarea {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border: 1px solid rgba(255, 245, 235, 0.92);
            border-radius: 4px;
        }

        .form-container button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background-color: rgba(255, 245, 235, 0.92); /* Set the Save Changes button background color to beige */
            color: #5a3e2b; /* Adjust text color for contrast */
            cursor: pointer;
        }

        .form-container button::after {
            content: ' ₹';
        }

        .faq-links {
            margin-top: 2rem;
        }

        .faq-links a {
            display: block;
            margin-bottom: 0.5rem;
            color: #490f0f32;
            text-decoration: none;
        }

        .faq-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
                align-items: center;
            }

            .tabs button {
                margin-bottom: 0.5rem;
            }
        }

        .blue-header, .tabs, .tab-content, footer {
            position: relative; /* Ensure these elements are above the video */
            z-index: 1;
        }

        .settings-box {
            background-color: rgba(255, 245, 235, 0.92); /* Create a box for the settings page */
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 2rem auto;
            width: 90%;
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
    <source src="../../assests/silk video.mp4" type="video/mp4">
</video>
    <header class="blue-header">
        <a href="../login.html" class="back-link">← Home</a>
        <h1>Settings</h1>
    </header>

    <div class="tabs">
        <button class="active" data-tab="manage-account">Manage Account</button>
        <button data-tab="help-center">Help Center</button>
    </div>

    <div class="tab-content active" id="manage-account">
        <h2>Manage Account</h2>
        <div class="form-container">
            <label for="company-name">Company Name</label>
            <input type="text" id="company-name">

            <label for="gst">GST</label>
            <input type="text" id="gst">

            <label for="addresses">Addresses</label>
            <textarea id="addresses" rows="4"></textarea>

            <label for="logo">Logo</label>
            <input type="file" id="logo">

            <label for="password">Password</label>
            <input type="password" id="password">

            <button>Save Changes</button>
        </div>
    </div>

    <div class="tab-content" id="help-center">
        <h2>Help Center</h2>
        <div class="form-container">
            <label for="search">Search FAQs</label>
            <input type="text" id="search" placeholder="Type your query...">
        </div>

        <div class="faq-links">
            <a href="#">Full FAQs</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Privacy Policy</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Fabric Bazaar. All rights reserved.</p>
    </footer>

    <script>
        const tabs = document.querySelectorAll('.tabs button');
        const tabContents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                tabContents.forEach(content => {
                    content.classList.remove('active');
                });

                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
    </script>
</body>
</html>
