<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Forum</title>

<style>
/* ===== FONT & BASE (FROM CHAT PAGE) ===== */
body {
  font-family: 'Georgia', serif;
  margin: 0;
  padding: 0;
  background: transparent;
  color: #3e2723;
  min-height: 100vh;
}

/* ===== BACKGROUND VIDEO ===== */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100vw;
  min-height: 100vh;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
  pointer-events: none;
}

/* ===== HEADER (UNCHANGED STRUCTURE) ===== */
.blue-header {
  background-color:#e0c68c
  color: white;
  padding: 1rem;
  text-align: center;
  position: relative;
}

.blue-header .back-link {
  color: white;
  text-decoration: none;
  font-size: 1.2rem;
  position: absolute;
  left: 1rem;
  top: 1rem;
}

/* ===== CONTENT ===== */
.container {
  padding: 2rem;
}

.categories {
  display: flex;
  justify-content: space-around;
  margin-bottom: 2rem;
}

.categories button {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 4px;
  background-color: #e0c68c;
  color: white;
  cursor: pointer;
  font-family: inherit;
}

/* ===== TABLE ===== */
.thread-list {
  width: 100%;
  border-collapse: collapse;
  background-color: rgba(255, 255, 255, 0.92);
  border-radius: 8px;
  overflow: hidden;
}

.thread-list th,
.thread-list td {
  padding: 1rem;
  text-align: left;
  border-bottom: 1px solid #ddd;
  font-family: inherit;
}

.thread-list th {
  background-color: #e0c68c;
  color: white;
}

.thread-list tr:hover {
  background-color: #f1f1f1;
}

/* ===== ACTIONS ===== */
.actions {
  margin: 2rem auto;
  text-align: center;
}

.actions button {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 4px;
  background-color: #e0c68c;
  color: white;
  cursor: pointer;
  font-family: inherit;
}

.actions button::after {
  content: " ₹";
}

/* ===== MODAL FORM ===== */
.form-container {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: white;
  padding: 2rem;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  z-index: 1000;
}

.form-container.active {
  display: block;
}

.form-container label {
  display: block;
  margin-bottom: 0.5rem;
}

.form-container input,
.form-container select,
.form-container textarea {
  width: 100%;
  margin-bottom: 1rem;
  padding: 0.5rem;
  border: 1px solid #ddd;
  border-radius: 4px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .thread-list thead {
    display: none;
  }

  .thread-list tr {
    display: flex;
    flex-direction: column;
    margin-bottom: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  .thread-list td {
    display: flex;
    justify-content: space-between;
  }

  .thread-list td::before {
    content: attr(data-label);
    font-weight: bold;
  }
}
</style>
</head>

<body>

<!-- ✅ BACKGROUND VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="../../assests/silk video.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<header class="blue-header">
  <a href="../login.html" class="back-link">← Home</a>
  <h1>Community Forum</h1>
</header>

<div class="container">
  <div class="categories">
    <button>Discussions</button>
    <button>Blogs</button>
    <button>Events</button>
  </div>

  <table class="thread-list">
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Replies</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td data-label="Title">How to choose the best fabric?</td>
        <td data-label="Author">John Doe</td>
        <td data-label="Replies">5</td>
        <td data-label="Date">2025-12-01</td>
      </tr>
      <tr>
        <td data-label="Title">Upcoming textile events</td>
        <td data-label="Author">Jane Smith</td>
        <td data-label="Replies">10</td>
        <td data-label="Date">2025-12-05</td>
      </tr>
    </tbody>
  </table>

  <div class="actions">
    <button id="create-post">Create New Post</button>
  </div>

  <div class="form-container" id="post-form">
    <h2>Create New Post</h2>

    <label>Title</label>
    <input type="text">

    <label>Content</label>
    <textarea rows="4"></textarea>

    <label>Category</label>
    <select>
      <option>Discussions</option>
      <option>Blogs</option>
      <option>Events</option>
    </select>

    <button id="submit-post">Submit</button>
  </div>
</div>

<footer style="background:rgba(255,255,255,0.9);text-align:center;padding:1rem;">
  &copy; 2025 Fabric Bazaar. All rights reserved.
</footer>

<script>
document.getElementById('create-post').onclick = () =>
  document.getElementById('post-form').classList.add('active');

document.getElementById('submit-post').onclick = () => {
  alert('Post submitted successfully!');
  document.getElementById('post-form').classList.remove('active');
};
</script>

</body>
</html>
