<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Catalog / Fabrics</title>
  <base href="../../src/Wholesaler/">

  <style>
    /* ===== THEME VARIABLES ===== */
    :root {
      --bazaar-bg: rgba(255, 245, 235, 0.92);
      --gold: #c7a76c;
      --gold-dark: #a67c52;
      --text: #3e2723;
      --text-light: #8d6e3f;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      color: var(--text);
      background: transparent;
    }

    /* ===== BACKGROUND VIDEO ===== */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      background: var(--bazaar-bg);
      border-bottom: 2px solid var(--gold);
    }

    .back-link {
      color: var(--text);
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .header-title {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: #6d4c1e;
    }

    .profile-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bazaar-bg);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .profile-btn svg {
      width: 24px;
      height: 24px;
      fill: var(--text-light);
    }

    /* ===== FILTER BAR ===== */
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding: 20px 38px;
      background: var(--bazaar-bg);
    }

    .search-input,
    .filter-select,
    .filter-input {
      padding: 10px 18px;
      border: 2px solid var(--gold);
      border-radius: 30px;
      font-family: inherit;
      background: #fff;
    }

    .search-input {
      flex: 1;
      min-width: 260px;
    }

    /* ===== GRID ===== */
    .fabrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 30px;
      padding: 38px;
    }

    .fabric-card {
      background: var(--bazaar-bg);
      border-radius: 12px;
      border: 2px solid #e0c68c;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(180,140,60,0.08);
      transition: 0.2s ease;
    }

    .fabric-card:hover {
      box-shadow: 0 8px 28px rgba(180,140,60,0.18);
      border-color: var(--gold-dark);
    }

    .fabric-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
      position: relative;
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #d4af37;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .restricted {
      background: #b22222;
    }

    .fabric-name {
      font-size: 1.15rem;
      font-weight: bold;
      color: #6d4c1e;
      margin-bottom: 6px;
    }

    .fabric-info {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.4;
    }

    /* ===== BUTTONS ===== */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      padding: 10px;
      border-radius: 30px;
      border: none;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary {
      background: #ffe7b3;
      color: #6d4c1e;
    }

    .btn-primary:hover {
      background: #ffd180;
    }

    .btn-request {
      background: #ffecb3;
      color: #a0522d;
    }

    .btn-request:hover {
      background: #ffdd88;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 20px;
      background: var(--bazaar-bg);
    }

    footer a {
      color: var(--text);
      text-decoration: none;
      margin: 0 10px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .filters-bar,
      .fabrics-grid {
        padding: 20px 12px;
      }

      .header-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <!-- Background Video -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="../../assests/silk video.mp4" type="video/mp4">
  </video>

  <!-- Header -->
  <div class="header">
    <a href="../bazaar-homepage.php" class="back-link">← Home</a>
    <div class="header-title">Browse Catalog / Fabrics</div>
    <div class="profile-btn">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="5"/>
        <path d="M12 14c-5 0-8 2.5-8 5v1h16v-1c0-2.5-3-5-8-5z"/>
      </svg>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <input class="search-input" placeholder="Search fabrics...">
    <select class="filter-select">
      <option>Composition</option>
      <option>Cotton</option>
      <option>Silk</option>
      <option>Polyester</option>
      <option>Linen</option>
    </select>
    <input class="filter-input" placeholder="GSM">
    <input class="filter-input" placeholder="Price">
    <input class="filter-input" placeholder="Color">
  </div>

  <!-- Grid -->
  <div class="fabrics-grid">

    <div class="fabric-card">
      <img src="../../assests/fabric1.jpg" class="fabric-img">
      <div class="card-body">
        <span class="badge">Public</span>
        <div class="fabric-name">Silk Saffron</div>
        <div class="fabric-info">
          Arya Textiles<br>GSM: 120 • MOQ: 100 m<br>₹520 – ₹680 / m
        </div>
        <div class="buttons">
          <button class="btn btn-primary">Add to Cart</button>
          <button class="btn btn-primary">Request Sample</button>
        </div>
      </div>
    </div>

    <div class="fabric-card">
      <img src="../../assests/fabric2.jpg" class="fabric-img">
      <div class="card-body">
        <span class="badge restricted">Restricted</span>
        <div class="fabric-name">Cotton Blue Premium</div>
        <div class="fabric-info">
          Raj Wholesalers<br>GSM: 150 • MOQ: 50 m<br>Price on request
        </div>
        <div class="buttons">
          <button class="btn btn-request">Request Access</button>
        </div>
      </div>
    </div>

  </div>

  <footer>
    <a href="#">FAQs</a> |
    <a href="#">Terms & Conditions</a> |
    <a href="#">Privacy Policy</a>
  </footer>

</body>
</html>
