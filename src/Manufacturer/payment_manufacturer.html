<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bazaar-e-Hind - Manufacturer Payment Management</title>
    <base href="../../src/Manufacturer/">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css_all_pages.css">
  <style>
    /* Page-specific styling to match design */
    body { font-family: Georgia, "Times New Roman", Times, serif; color:#3b1f10; }
    header { background:#fff4e6; padding:22px 40px; border-bottom:6px solid #3e1406; display:flex; align-items:center; }
    .back-link { color:#8a5b22; text-decoration:none; font-weight:600; margin-right:20px; }
    .header-title { font-size:30px; font-weight:700; margin:0 auto 0 0; color:#3e1406 }
    #bg-video { position:fixed; right:0; bottom:0; min-width:100%; min-height:100%; z-index:-2; object-fit:cover; }
    video::cue { color: transparent }
    /* dark overlay to match warm background */
    body::before { content:''; position:fixed; left:0; top:0; right:0; bottom:0; background:linear-gradient(180deg, rgba(62,20,6,0.7), rgba(62,20,6,0.4)); z-index:-1; }

    .payment-container { max-width:1200px; margin:30px auto; padding:10px 20px 70px; }
    .receipt-message { text-align:center; margin:8px 0 16px; color:#3e1406; font-weight:600; }

    .table-header, .table-row { display:flex; gap:10px; align-items:center; background:#fff9ef; border-radius:12px; padding:16px; }
    .table-header { background:#fff6e6; font-weight:700; color:#6b3e23; }
    .table-row { background:#fff; margin-top:20px; }
    .table-cell { flex:1; padding:6px 12px; }
    .table-cell.actions { flex:0 0 160px; text-align:right; }

    .status { display:inline-block; padding:6px 12px; border-radius:12px; font-weight:700; font-size:14px; }
    .status.completed { background:#ccefd0; color:#1c6a2e; }
    .status.pending { background:#f5e3b8; color:#946400; }
    .status.failed { background:#f6cfcf; color:#a61c1c; }

    .generate-btn { background:#b6892a; color:#fff; border:none; padding:10px 14px; border-radius:18px; font-weight:700; cursor:pointer; box-shadow:0 2px 0 rgba(0,0,0,0.15); }
    .generate-btn:hover { transform:translateY(-1px); }

    /* make header labels align like picture */
    .table-header .table-cell { text-align:left; }
    .table-header .actions { text-align:right; }


    @media(max-width:900px){
      .table-header, .table-row { flex-direction:column; align-items:flex-start; }
      .table-cell.actions { width:100%; text-align:left; }
    }
  </style>
</head>
<body>
  <video autoplay muted loop id="bg-video">
    <source src="../../assests/silk video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class=" header">
    <a href="bazaar-homepage.php" class="back-link" title="Back to Home">&#8592; Home</a>
    <span class="header-title">Payment Management</span>
      <div class="profile-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M12 14c-5 0-8 2.5-8 5v1h16v-1c0-2.5-3-5-8-5z"/></svg>
    </div> 
  </div>
  <main class="payment-container">
    <div id="receiptMsg" class="receipt-message"></div>
    <div class="responsive-table">
      <div class="table-header">
        <div class="table-cell">Order ID</div>
        <div class="table-cell">Amount</div>
        <div class="table-cell">Method</div>
        <div class="table-cell">Status</div>
        <div class="table-cell">Date</div>
        <div class="table-cell actions">Actions</div>
      </div>
      <div class="table-row">
        <div class="table-cell">1001</div>
        <div class="table-cell">₹12,000</div>
        <div class="table-cell">UPI</div>
        <div class="table-cell"><span class="status completed">Completed</span></div>
        <div class="table-cell">2025-03-10</div>
        <div class="table-cell actions">
          <button class="generate-btn" onclick="generateReceipt('1001', '₹12,000')">Generate Receipt &#8377;</button>
        </div>
      </div>
      <div class="table-row">
        <div class="table-cell">1002</div>
        <div class="table-cell">₹5,000</div>
        <div class="table-cell">Bank Transfer</div>
        <div class="table-cell"><span class="status pending">Pending</span></div>
        <div class="table-cell">2025-03-12</div>
        <div class="table-cell actions">
          <button class="generate-btn" onclick="generateReceipt('1002', '₹5,000')">Generate Receipt &#8377;</button>
        </div>
      </div>
      <div class="table-row">
        <div class="table-cell">1003</div>
        <div class="table-cell">₹7,500</div>
        <div class="table-cell">Credit Card</div>
        <div class="table-cell"><span class="status completed">Completed</span></div>
        <div class="table-cell">2025-03-15</div>
        <div class="table-cell actions">
          <button class="generate-btn" onclick="generateReceipt('1003', '₹7,500')">Generate Receipt &#8377;</button>
        </div>
      </div>
      <div class="table-row">
        <div class="table-cell">1004</div>
        <div class="table-cell">₹2,500</div>
        <div class="table-cell">UPI</div>
        <div class="table-cell"><span class="status failed">Failed</span></div>
        <div class="table-cell">2025-03-18</div>
        <div class="table-cell actions">
          <button class="generate-btn" onclick="generateReceipt('1004', '₹2,500')">Generate Receipt &#8377;</button>
        </div>
      </div>
      <div class="table-row">
        <div class="table-cell">1005</div>
        <div class="table-cell">₹12,000</div>
        <div class="table-cell">UPI</div>
        <div class="table-cell"><span class="status pending">Pending</span></div>
        <div class="table-cell">2025-03-20</div>
        <div class="table-cell actions">
          <button class="generate-btn" onclick="generateReceipt('1005', '₹12,000')">Generate Receipt &#8377;</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    function generateReceipt(orderId, amount) {
      var msg = document.getElementById('receiptMsg');
      msg.textContent = "Receipt generated for Order #" + orderId + " (" + amount + ")";
      setTimeout(function(){ msg.textContent = ""; }, 4000);
    }
  </script>
</body>
</html>
