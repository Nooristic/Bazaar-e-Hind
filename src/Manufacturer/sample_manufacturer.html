<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bazaar-e-Hind - Manufacturer Sample Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bazaar-bg: #f5ebe3;
      --primary: #b88c2b;
      --accent: #e0c68c;
      --border: #e0c68c;
      --text: #3e2723;
      --btn: #ffe7b3;
      --btn-hover: #ffd180;
    }
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: transparent;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100vw;
      min-height: 100vh;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      opacity: 1;
      pointer-events: none;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background: var(--bazaar-bg);
      border-bottom: 2px solid var(--border);
      padding: 18px 24px;
      gap: 18px;
    }
    .back-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      margin-right: 12px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .back-link:hover {
      color: #a67c52;
    }
    .header-title {
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .sample-container {
      flex: 1;
      padding: 32px 32px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
    }
    .responsive-table {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-x: auto;
    }
    .table-row, .table-header {
      display: flex;
      align-items: stretch;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(180,140,60,0.05);
      border: 1.5px solid var(--border);
      padding: 0;
      min-width: 900px;
    }
    .table-header {
      background: #fffbe6;
      font-weight: bold;
      color: #6d4c1e;
      font-size: 1.05rem;
      border-bottom: 2px solid var(--border);
    }
    .table-cell {
      flex: 1 1 0;
      padding: 14px 10px;
      display: flex;
      align-items: center;
      min-width: 110px;
      box-sizing: border-box;
      font-size: 1rem;
      word-break: break-word;
    }
    .table-cell.status select {
      padding: 6px 10px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: #fffbe6;
      font-size: 1rem;
      color: #3e2723;
    }
    .table-cell.actions {
      gap: 8px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: var(--btn);
      color: #6d4c1e;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 1rem;
      cursor: pointer;
      margin-right: 4px;
      margin-bottom: 4px;
      transition: background 0.15s, border 0.15s;
    }
    .action-btn:hover {
      background: var(--btn-hover);
      border-color: var(--primary);
    }
    .dispatch-fields {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.97rem;
    }
    .dispatch-fields input {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1.2px solid var(--border);
      font-size: 1rem;
      margin-bottom: 2px;
      width: 180px;
      background: #fffbe6;
    }
    footer {
      background: #fffbe6;
      border-top: 2px solid var(--border);
      padding: 16px 0 12px 0;
      text-align: center;
      font-size: 1rem;
      margin-top: auto;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: #6d4c1e;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .footer-links a:hover {
      color: var(--primary);
    }
    @media (max-width: 1050px) {
      .sample-container {
        padding: 18px 2vw 18px 2vw;
      }
      .responsive-table {
        min-width: 0;
      }
      .table-row, .table-header {
        min-width: 700px;
      }
    }
    @media (max-width: 700px) {
      .sample-container {
        padding: 10px 2vw 10px 2vw;
      }
      .table-row, .table-header {
        flex-direction: column;
        min-width: 0;
        border-radius: 10px;
        margin-bottom: 8px;
      }
      .table-cell {
        padding: 10px 8px;
        min-width: 0;
        border-bottom: 1px solid #f5ebe3;
      }
      .table-header .table-cell {
        border-bottom: none;
      }
      .table-cell:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <video autoplay muted loop id="bg-video">
    <source src="../../assests/silk video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <header>
    <a href="bazaar-homepage.html" class="back-link" title="Back to Home">&#8592; Home</a>
    <span class="header-title">Sample Management</span>
  </header>
  <main class="sample-container">
    <div class="responsive-table">
      <div class="table-header">
        <div class="table-cell">Request ID</div>
        <div class="table-cell">Wholesaler</div>
        <div class="table-cell">Fabric</div>
        <div class="table-cell">Quantity</div>
        <div class="table-cell">Notes</div>
        <div class="table-cell status">Status</div>
        <div class="table-cell actions">Actions</div>
      </div>
      <!-- Sample Row 1 -->
      <div class="table-row">
        <div class="table-cell">REQ-101</div>
        <div class="table-cell">Arya Textiles</div>
        <div class="table-cell">Silk Saffron</div>
        <div class="table-cell">20 m</div>
        <div class="table-cell">Urgent delivery</div>
        <div class="table-cell status">
          <select>
            <option>Requested</option>
            <option>Accepted</option>
            <option>Rejected</option>
            <option>Shipped</option>
            <option>Delivered</option>
          </select>
        </div>
        <div class="table-cell actions">
          <button class="action-btn">Approve</button>
          <button class="action-btn">Reject</button>
          <button class="action-btn dispatch-toggle" onclick="toggleDispatch(this)">Dispatch</button>
          <div class="dispatch-fields" style="display:none;">
            <input type="date" placeholder="Est. Date">
            <input type="text" placeholder="Courier Details">
            <input type="url" placeholder="Tracking URL">
          </div>
        </div>
      </div>
      <!-- Sample Row 2 -->
      <div class="table-row">
        <div class="table-cell">REQ-102</div>
        <div class="table-cell">Raj Wholesalers</div>
        <div class="table-cell">Cotton Blue</div>
        <div class="table-cell">10 m</div>
        <div class="table-cell">Sample for new client</div>
        <div class="table-cell status">
          <select>
            <option>Requested</option>
            <option selected>Accepted</option>
            <option>Rejected</option>
            <option>Shipped</option>
            <option>Delivered</option>
          </select>
        </div>
        <div class="table-cell actions">
          <button class="action-btn">Approve</button>
          <button class="action-btn">Reject</button>
          <button class="action-btn dispatch-toggle" onclick="toggleDispatch(this)">Dispatch</button>
          <div class="dispatch-fields" style="display:none;">
            <input type="date" placeholder="Est. Date">
            <input type="text" placeholder="Courier Details">
            <input type="url" placeholder="Tracking URL">
          </div>
        </div>
      </div>
      <!-- Add more rows as needed -->
    </div>
  </main>
  <footer>
    <div class="footer-links">
      <a href="#">FAQs</a>
      <a href="#">Terms &amp; Conditions</a>
      <a href="#">Privacy Policy</a>
    </div>
  </footer>
  <script>
    // Show/hide dispatch fields
    function toggleDispatch(btn) {
      var fields = btn.parentElement.querySelector('.dispatch-fields');
      if (fields.style.display === 'none' || fields.style.display === '') {
        fields.style.display = 'flex';
        btn.textContent = 'Hide Dispatch';
      } else {
        fields.style.display = 'none';
        btn.textContent = 'Dispatch';
      }
    }
  </script>
</body>
</html>
